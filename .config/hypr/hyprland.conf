# -----------------------------------------------------
# إعدادات Alaa.ksa لبيئة Hyprland - النسخة الاحترافية 2026
# -----------------------------------------------------

# --- إعدادات NVIDIA و Wayland ---
env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = WLR_NO_HARDWARE_CURSORS,1
env = CURSOR_SIZE,24

# --- الشاشات (2K @ 144Hz) ---
monitor=,2560x1440@144,auto,1

# --- البرامج الأساسية ---
$terminal = kitty
$fileManager = dolphin
$menu = wofi --show drun
$mainMod = SUPER

# --- التشغيل التلقائي (Autostart) ---
exec-once = swww-daemon &
exec-once = waybar &
exec-once = nm-applet --indicator &
exec-once = swaync &
# تحميل الخلفية الافتراضية
exec-once = swww img ~/dotfiles/wallpapers/default.jpg --transition-type outer --transition-pos top-right

# --- المظهر العام (Look and Feel) ---
general {
    gaps_in = 6
    gaps_out = 12
    border_size = 2
    # ألوان Catppuccin Mocha للحدود
    col.active_border = rgba(89b4faff) rgba(f5c2e7ff) 45deg
    col.inactive_border = rgba(595959aa)
    layout = dwindle
    resize_on_border = true
}

# استيراد ملفات الجماليات والأنيميشن
source = ~/.config/hypr/caelestia_decoration.conf
source = ~/.config/hypr/caelestia_animations.conf

# --- المدخلات (Input) ---
input {
    kb_layout = us, ara
    kb_options = grp:alt_shift_toggle
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = false
    }
}

# --- إعدادات النوافذ (Dwindle) ---
dwindle {
    pseudotile = true
    preserve_split = true
}

# --- الاختصارات (Keybindings) ---

# الأوامر الأساسية
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, R, exec, $menu
bind = $mainMod, P, pseudo,
bind = $mainMod, J, togglesplit,
bind = $mainMod, F, fullscreen,

# اختصار تغيير الخلفية العشوائي (Super + B)
bind = $mainMod, B, exec, swww img $(find ~/dotfiles/wallpapers -type f | shuf -n 1) --transition-type random

# إدارة الواجهة (إعادة تحميل سريعة)
bind = $mainMod SHIFT, R, exec, pkill waybar; waybar &
bind = $mainMod SHIFT, C, exec, hyprctl reload
bind = $mainMod, L, exec, hyprlock

# التنقل بين النوافذ
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# --- إدارة مساحات العمل الـ 10 (Workspaces) ---
# التنقل (Super + Number)
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# نقل النوافذ (Super + Shift + Number)
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# --- التحكم في الصوت والوسائط ---
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# التحكم في الفأرة
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# --- قواعد النوافذ (Window Rules) ---
windowrule = suppressevent maximize, class:.*
windowrulev2 = float, class:(pavucontrol)
windowrulev2 = float, class:(nm-connection-editor)
windowrulev2 = opacity 0.9 0.8, class:(kitty)
windowrulev2 = opacity 0.9 0.8, class:(dolphin)
