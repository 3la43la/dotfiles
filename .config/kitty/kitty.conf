# استدعاء ثيم Catppuccin
include themes/catppuccin_mocha.conf

# إعدادات الخط (بما أنك مبرمج، JetBrains Mono هو الأفضل)
font_family      JetBrains Mono
bold_font        auto
italic_font      auto
font_size        13.0

# الشفافية (لإظهار خلفيات Catppuccin Landscapes خلف الكود)
background_opacity 0.85
background_blur    1

# إخفاء شريط العنوان العلوي (للحصول على مظهر Minimalist)
hide_window_decorations yes

# شكل المؤشر (Cursor)
cursor_shape beam
cursor_vi_mode_bold yes
